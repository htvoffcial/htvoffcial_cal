name: 🤸 Update Oniisan iCal

on:
  schedule:
    # 毎日 JST 06:00 に実行 (UTC 21:00)
    # ※ お兄さんは朝礼なので update-ics.yml (00:05) より後に動かす
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-oniisan-ics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📆 Set JST date env
        run: |
          echo "JST_DATE=$(TZ='Asia/Tokyo' date '+%Y-%m-%d')" >> "$GITHUB_ENV"
          echo "JST_MONTH=$(TZ='Asia/Tokyo' date '+%Y-%m')"   >> "$GITHUB_ENV"

      - name: 🤸 Run oniisan iCal update script
        run: python .github/scripts/update_oniisan.py

      - name: 📊 Show diff
        run: |
          echo "=== oniisan.ics ==="
          git diff --stat oniisan.ics || true
          echo "=== Archive/ ==="
          git diff --stat Archive/ || true

      - name: 💾 Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add oniisan.ics Archive/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "ℹ️  変更なし（お兄さんはお休みかも）。コミットをスキップします。"
          else
            git commit -m "🤸 Update oniisan.ics [${{ env.JST_DATE }}]

          - README.md の体操のお兄さんブロックを oniisan.ics に追記
          - 月をまたぐ場合は Archive/${{ env.JST_MONTH }}-oniisan.ics へ移動
          
          [skip ci]"
            git push
            echo "✅ Push 完了！お兄さん今日もありがとう！"
          fi
